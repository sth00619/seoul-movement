name: Build and Deploy Interactive Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build interactive snapshots
        # python -m runs from the repo root so "from src import ..." resolves correctly.
        # Falls back to mock data if real processed parquets are not committed.
        run: |
          if [ -f data/processed/features.parquet ]; then
            python -m src.build_interactive --source processed
          else
            python -m src.build_interactive --source mock --seed 42
          fi

      - name: Disable Jekyll (serve raw HTML, not Jekyll-processed output)
        run: touch interactive/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: interactive

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
