name: Build and Deploy Interactive Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build interactive snapshots
        # python -m runs from the repo root so "from src import ..." resolves correctly.
        # Falls back to mock data if real processed parquets are not committed.
        run: |
          if [ -f data/processed/features.parquet ]; then
            python -m src.build_interactive --source processed
          else
            python -m src.build_interactive --source mock --seed 42
          fi

      - name: Disable Jekyll (serve raw HTML, not Jekyll-processed output)
        run: touch interactive/.nojekyll

      - name: Configure Pages
        # v5 ships with Node 24 runtime — no more [DEP0040] punycode warnings.
        # Ref: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        # v3 of upload-pages-artifact bundles upload-artifact@v4 internally (Node 20).
        # Pinning to @v4 picks up the Node 24-compatible build once it ships;
        # in the meantime the FORCE flag below silences the deprecation warning.
        uses: actions/upload-pages-artifact@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          path: interactive

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # v4 → v5 for Node 24 readiness.
        uses: actions/deploy-pages@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
